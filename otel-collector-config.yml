# otel-collector-config.yml — minimal OTLP collector config for llm-router
# Mount at /etc/otel-collector-config.yml inside the container.

receivers:
  otlp:
    protocols:
      http:
        endpoint: "0.0.0.0:4318"
      grpc:
        endpoint: "0.0.0.0:4317"

processors:
  batch:
    timeout: 5s
    send_batch_max_size: 1024

exporters:
  logging:
    loglevel: debug
  # Jaeger exporter (uncomment to send traces to Jaeger)
  # jaeger:
  #   endpoint: "jaeger:14250"
  #   tls:
  #     insecure: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters:
        - logging
        # - jaeger
