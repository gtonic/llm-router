# ============================================
# LLM Router - Docker Compose (local dev)
# ============================================
# Usage:
#   docker compose up -d          # Start all services
#   docker compose down           # Stop all services
#   docker compose logs -f app    # View app logs
# ============================================

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: llm-router:latest
    container_name: llm-router
    ports:
      - "${CONTAINER_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      # Override env_file values with defaults
      - ROUTER_DEFAULT_STRATEGY=${ROUTER_DEFAULT_STRATEGY:-complexity}
      - ROUTER_DEFAULT_MODEL=${ROUTER_DEFAULT_MODEL:-llama-local}
      - ROUTER_FALLBACK_MODEL=${ROUTER_FALLBACK_MODEL:-gpt-5.4-nano}
      - ROUTER_STRICT_CONFIG=${ROUTER_STRICT_CONFIG:-true}
      - ROUTER_ALLOWED_MODELS=${ROUTER_ALLOWED_MODELS:-llama-local,gpt-5.6-luna}
      - ROUTER_OTELP_ENDPOINT=${ROUTER_OTELP_ENDPOINT:-http://jaeger:4317/v1/traces}
      - ROUTER_OTELP_PROTOCOL=${ROUTER_OTELP_PROTOCOL:-grpc}
    volumes:
      - ./profiles:/app/profiles:rw
      - ./agent-policies:/app/agent-policies:ro
      - ./logs:/app/logs:rw
      - ./config:/app/config:rw
    depends_on:
      - jaeger
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks:
      - llm-router-net
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 512M
          cpus: "0.5"

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    ports:
      - "16686:16686"  # Web UI
      - "14268:14268"  # HTTP ingest
      - "14250:14250"  # gRPC ingest
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - COLLECTOR_OTLP_HTTP_ENABLED=true
      - LOG_LEVEL=debug
      - MEMORY_MAX_TRACES=50000
      - QUERY_BASE_PATH=/jaeger
    networks:
      - llm-router-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 256M
          cpus: "0.25"

networks:
  llm-router-net:
    driver: bridge
    name: llm-router-net
