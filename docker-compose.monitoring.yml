# ============================================
# LLM Router - Monitoring Stack
# ============================================
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.monitoring.yml up -d
#
# Services:
#   - Jaeger (Traces):      http://localhost:16686
#   - Prometheus (Metrics): http://localhost:9090
#   - Grafana (Dashboard):  http://localhost:3001
# ============================================

x-prometheus-volume: &prometheus-volume
  volumes:
    - prometheus-data:/prometheus

services:
  prometheus:
    profiles: ["monitoring"]
    # Pinned by digest for reproducible builds (was prom/prometheus:latest).
    image: prom/prometheus@sha256:3c42b892cf723fa54d2f262c37a0e1f80aa8c8ddb1da7b9b0df9455a35a7f893
    <<: *prometheus-volume
    ports:
      - "9090:9090"
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./configs/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
    networks:
      - llm-router-net
    restart: unless-stopped

  grafana:
    profiles: ["monitoring"]
    # Pinned by digest for reproducible builds (was grafana/grafana:latest).
    image: grafana/grafana@sha256:121a7a9ece6dc10b969f1f96eed64b4f07dfac0d0b8abc070f7cb83bbde86f63
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/provisioning/dashboards/llm-router.json
    volumes:
      - grafana-data:/var/lib/grafana
      - ./configs/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - llm-router-net
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  prometheus-data:
  grafana-data:
    name: llm-router_grafana-data-clean

networks:
  llm-router-net:
    external: true
